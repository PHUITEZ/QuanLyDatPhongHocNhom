<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Đặt Phòng Học Nhóm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container mt-5">

    <h1>HỆ THỐNG ĐẶT PHÒNG HỌC NHÓM</h1>

    <!-- Dashboard -->
    <div class="row text-center mt-4">

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h3 id="roomCount">0</h3>
                    <p>Tổng số phòng</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h3 id="studentCount">0</h3>
                    <p>Tổng sinh viên</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h3 id="bookingCount">0</h3>
                    <p>Tổng lượt đặt</p>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
